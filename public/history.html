app.get('/bookings/:user_id', (req, res) => {
  const userId = req.params.user_id;
  db.query('SELECT * FROM bookings WHERE user_id = ?', [userId], (err, results) => {
    if (err) {
      console.error(err);
      res.status(500).send('Error fetching bookings');
    } else {
      res.json(results);
    }
  });
});
